  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    min-height: 100%;
    font-family: 'Inter', sans-serif;
    background: #333333;
    color: #fff;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 64px;
  }

  .header-img {
    width: 100%;
    max-width: 360px;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 36px;
  }

  .header-img img {
    width: 100%;
    height: auto;
    display: block;
  }

  .divider {
    width: 28px;
    height: 2px;
    background: #FFDE05;
    border-radius: 2px;
    margin: 0 auto 36px;
    opacity: 0.7;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 20px;
    border-radius: 10px;
    text-decoration: none;
    background: rgba(255,255,255,0.04);
    border: 2px solid #FFDE05;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }

  .link-btn:hover {
    transform: translateY(-2px);
    background: rgba(255,222,5,0.08);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .link-btn:active { transform: translateY(0); }

  .btn-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  .btn-label {
    font-family: 'NeuePlak', 'Inter', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    color: #fff;
  }

  .footer {
    margin-top: 52px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
